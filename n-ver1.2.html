<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>珍獣ののいの部屋</title>
<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: #fff3f8;
    color: #5a3a45;
    text-align: center;
  }

  .game {
    max-width: 960px;
    margin: auto;
    padding: 16px;
    box-sizing: border-box;
  }

  .title-logo {
    width: 360px;
    max-width: 90%;
    margin: 0 auto 10px;
    display: block;
  }

  .room {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background-image:
      linear-gradient(rgba(255,250,252,0.12), rgba(255,250,252,0.12)),
      url("https://raw.githubusercontent.com/nonoygk/chinjunonoy/main/room.png");
    background-size: cover;
    background-position: center;
    border: 3px solid #f3c6d8;
    border-radius: 24px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    overflow: hidden;
  }

  .owned {
    display: none;
  }

  .room-item {
    position: absolute;
    display: none;
    pointer-events: none;
    filter: drop-shadow(0 5px 6px rgba(0,0,0,0.12));
    z-index: 2;
  }

  .item-tea {
    width: 20%;
    left: 42%;
    bottom: 2%;
    z-index: 4;
  }

  .item-books {
    width: 15%;
    left: 26%;
    bottom: 12%;
    z-index: 2;
  }

  .item-plush {
    width: 20%;
    right: 14%;
    bottom: 10%;
    z-index: 2;
  }

  .item-shrine {
    width: 20%;
    left: 20%;
    bottom: 35%;
    z-index: 2;
  }

  .pet {
    position: absolute;
    left: 50%;
    top: 60%;
    transform: translate(-50%, -50%);
    width: 27%;
    max-width: 250px;
    min-width: 140px;
    z-index: 3;
  }

  .pet img {
    width: 100%;
    display: block;
    filter: drop-shadow(0 8px 10px rgba(0,0,0,0.18));
  }

  .status-box {
    position: absolute;
    top: 2%;
    left: 2%;
    width: 52%;
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(255,255,255,0.82);
    border-radius: 16px;
    padding: 10px 14px;
    box-sizing: border-box;
    z-index: 5;
  }



  .title-badge-box {
    position: absolute;
    right: 2%;
    bottom: 2%;
    max-width: 42%;
    background: rgba(255,255,255,0.88);
    border: 2px solid #f3c6d8;
    border-radius: 18px;
    padding: 7px 14px;
    box-sizing: border-box;
    z-index: 5;
    color: #7a4b5b;
    box-shadow: 0 4px 10px rgba(0,0,0,0.06);
    text-align: center;
    line-height: 1.35;
  }

  .title-badge-label {
    font-size: 11px;
    font-weight: bold;
  }

  .title-badge-name {
    font-size: 13px;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .level-box {
    display: inline-block;
    margin: 0 auto 12px;
    padding: 7px 18px;
    background: rgba(255,255,255,0.78);
    border: 2px solid #f3c6d8;
    border-radius: 999px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.04);
    color: #7a4b5b;
    font-weight: bold;
    font-size: 15px;
  }

  .points {
    font-size: 18px;
    font-weight: bold;
    margin: 0;
    min-width: 125px;
    white-space: nowrap;
  }

  .status-area {
    flex: 1;
    margin: 0;
    font-weight: bold;
    font-size: 12px;
  }

  .bar {
    width: 100%;
    height: 12px;
    background: #f3d9e5;
    border-radius: 999px;
    overflow: hidden;
    margin-top: 4px;
  }

  .bar-fill {
    height: 100%;
    width: 100%;
    background: #e77da8;
    border-radius: 999px;
    transition: width 0.3s;
  }

  .mood-fill {
    background: #f3a6c8;
  }

  .message {
    width: 100%;
    max-width: 760px;
    margin: 12px auto 14px;
    background: rgba(255,255,255,0.86);
    border: 2px solid #f3c6d8;
    border-radius: 18px;
    padding: 14px 18px;
    line-height: 1.65;
    font-size: 15px;
    white-space: pre-line;
    overflow-wrap: anywhere;
    box-sizing: border-box;
    box-shadow: 0 4px 10px rgba(0,0,0,0.06);
  }

  .action-buttons {
    margin-top: 10px;
    margin-bottom: 12px;
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  button {
    border: none;
    border-radius: 999px;
    background: #e77da8;
    color: white;
    font-size: 15px;
    padding: 10px 18px;
    margin: 5px;
  }

  button:disabled {
    background: #d8c4cc;
    color: #fff;
  }

  .reset {
    background: #b8a0aa;
  }

  .foods, .items, .achievements {
    margin-top: 14px;
  }

  .achievement-panel {
    width: 100%;
    max-width: 820px;
    margin: 8px auto 0;
    display: none;
    background: rgba(255,255,255,0.5);
    border: 2px solid #f3c6d8;
    border-radius: 18px;
    padding: 12px;
    box-sizing: border-box;
  }

  .achievement-panel.open {
    display: block;
  }

  .achievement-note {
    margin: 0 0 10px;
    font-size: 13px;
    color: #7a4b5b;
  }

  .achievement-list {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .achievement-badge {
    background: rgba(255,255,255,0.82);
    border: 2px solid #f3c6d8;
    border-radius: 16px;
    padding: 8px 12px;
    font-size: 13px;
    color: #5a3a45;
    box-shadow: 0 3px 8px rgba(0,0,0,0.04);
    max-width: 210px;
    text-align: left;
  }

  .achievement-badge.unlocked {
    cursor: pointer;
  }

  .achievement-badge.selected {
    border-color: #e77da8;
    background: #fff0f6;
  }

  .achievement-badge.locked {
    color: #b8a0aa;
    background: rgba(255,255,255,0.45);
  }

  .achievement-name {
    font-weight: bold;
  }

  .achievement-desc {
    margin-top: 4px;
    font-size: 11px;
    line-height: 1.45;
  }

  h2 {
    display: inline-block;
    font-size: 22px;
    margin: 14px 0 8px;
    padding: 6px 18px;
    color: #7a4b5b;
    background: rgba(255,255,255,0.62);
    border: 2px solid #f3c6d8;
    border-radius: 999px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.04);
  }

  @media (max-width: 600px) {
    .game {
      padding: 8px;
    }

    .title-logo {
      width: 260px;
      margin-bottom: 8px;
    }

    .room {
      aspect-ratio: 16 / 10;
    }

    .pet {
      width: 32%;
      top: 56%;
    }

    .status-box {
      top: 2%;
      left: 2%;
      width: 58%;
      gap: 6px;
      padding: 6px 8px;
      border-radius: 12px;
    }

    .title-badge-box {
      right: 2%;
      bottom: 2%;
      max-width: 48%;
      padding: 5px 9px;
      border-radius: 14px;
    }

    .title-badge-label {
      font-size: 8px;
    }

    .title-badge-name {
      font-size: 9px;
    }

    .level-box {
      font-size: 12px;
      padding: 5px 14px;
      margin-bottom: 8px;
    }

    .points {
      font-size: 10px;
      min-width: 72px;
    }

    .status-area {
      font-size: 8px;
    }

    .bar {
      height: 7px;
      margin-top: 2px;
    }

    .message {
      font-size: 13px;
      padding: 12px;
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .item-tea {
      width: 21%;
      left: 41%;
      bottom: 2%;
    }

    .item-books {
      width: 16%;
      left: 23%;
      bottom: 12%;
    }

    .item-plush {
      width: 22%;
      right: 13%;
      bottom: 10%;
    }

    .item-shrine {
      width: 21%;
      left: 19%;
      bottom: 35%;
    }

    .action-buttons {
      margin-top: 10px;
      margin-bottom: 10px;
    }

    button {
      font-size: 12px;
      padding: 7px 13px;
      margin: 4px;
    }

    h2 {
      font-size: 18px;
      margin-top: 16px;
      padding: 5px 16px;
    }
  }
</style>

「きゅ……」

    { id: "hungryCare", name: "空腹救助隊", description: "おなか0％の珍獣ののいにエサをあげた", condition: function() { return rescuedHungry >= 1; } },

    { id: "level10", name: "成長のきざし", description: "Lv.10に到達した", condition: function() { return getLevel() >= 10; } },
    { id: "level50", name: "超珍獣の目覚め", description: "Lv.50に到達した", condition: function() { return getLevel() >= 50; } },
    { id: "level100", name: "伝説の珍獣", description: "Lv.100に到達した", condition: function() { return getLevel() >= 100; } },
    { id: "level250", name: "神話級珍獣", description: "Lv.250に到達した", condition: function() { return getLevel() >= 250; } },
    { id: "level500", name: "究極珍獣", description: "Lv.500に到達した", condition: function() { return getLevel() >= 500; } },
    { id: "level1000", name: "夢界の珍獣", description: "Lv.1000に到達した", condition: function() { return getLevel() >= 1000; } },

    { id: "roomAndDream", name: "珍獣研究家", description: "全アイテムを集めて、夢ポイントを1万以上貯めた", condition: function() { return ownedItems.length >= Object.keys(ITEM_LABELS).length && maxDream >= 10000; } },
    { id: "limitYume", name: "限界夢女", description: "夢ポイントを100万以上貯めて、推し供給を50回あげた", condition: function() { return maxDream >= 1000000 && totalOshiFeeds >= 50; } },
    { id: "nonoiScholar", name: "珍獣博士", description: "Lv.100以上で、実績を30個以上解除した", condition: function() { return getLevel() >= 100 && achievements.length >= 30; } }
  ];
  let dream = Number(localStorage.getItem("dream")) || 0;
  let hunger = Number(localStorage.getItem("hunger")) || 50;
  let mood = Number(localStorage.getItem("mood")) || 50;
  let ownedItems = JSON.parse(localStorage.getItem("ownedItems")) || [];
  let achievements = JSON.parse(localStorage.getItem("achievements")) || [];
  let totalPets = Number(localStorage.getItem("totalPets")) || 0;
  let totalFeeds = Number(localStorage.getItem("totalFeeds")) || 0;
  let totalOshiFeeds = Number(localStorage.getItem("totalOshiFeeds")) || 0;
  let totalItemsBought = Number(localStorage.getItem("totalItemsBought")) || 0;
  let currentTitle = localStorage.getItem("currentTitle") || "";
  let maxDream = Number(localStorage.getItem("maxDream")) || dream;
  let totalDreamEarned = Number(localStorage.getItem("totalDreamEarned")) || dream;
  let rescuedSad = Number(localStorage.getItem("rescuedSad")) || 0;
  let rescuedHungry = Number(localStorage.getItem("rescuedHungry")) || 0;

  let hungerTimer = 0;
  let moodTimer = 0;
  let halfSpeedTimer = 0;
  let temporaryImageTimer = 0;
  let messageLockTimer = 0;
  let statusMessageTimer = 0;
  let currentStatusKey = "";

  ownedItems = ownedItems.map(function(item) {
    if (item === "📚") return "books";
    if (item === "🫖") return "tea";
    if (item === "🧸") return "plush";
    if (item === "✨") return "shrine";
    return item;
  });

  const lastSave = Number(localStorage.getItem("lastSave")) || Date.now();
  const now = Date.now();
  const offlineSeconds = Math.floor((now - lastSave) / 1000);

  if (offlineSeconds > 0) {
    let offlineDream = offlineSeconds;

    if (hunger <= 0) {
      offlineDream = Math.floor(offlineSeconds / 2);
    }

    addDream(offlineDream);
    hunger -= Math.floor(offlineSeconds / 60);
    mood -= Math.floor(offlineSeconds / 120);

    if (hunger < 0) hunger = 0;
    if (mood < 0) mood = 0;
  }

  const dreamText = document.getElementById("dream");
  const message = document.getElementById("message");
  const hungerText = document.getElementById("hungerText");
  const hungerBar = document.getElementById("hungerBar");
  const moodText = document.getElementById("moodText");
  const moodBar = document.getElementById("moodBar");
  const petImage = document.getElementById("petImage");
  const achievementList = document.getElementById("achievementList");
  const achievementPanel = document.getElementById("achievementPanel");
  const achievementToggle = document.getElementById("achievementToggle");
  const titleBadge = document.getElementById("titleBadge");
  const levelBox = document.getElementById("levelBox");

  const itemElements = {
    books: document.getElementById("itemBooks"),
    tea: document.getElementById("itemTea"),
    plush: document.getElementById("itemPlush"),
    shrine: document.getElementById("itemShrine"),
    diary: null,
    cushion: null,
    desk: null,
    portal: null
  };

  const buyButtons = {
    books: document.getElementById("buyBooks"),
    tea: document.getElementById("buyTea"),
    plush: document.getElementById("buyPlush"),
    shrine: document.getElementById("buyShrine"),
    diary: document.getElementById("buyDiary"),
    cushion: document.getElementById("buyCushion"),
    desk: document.getElementById("buyDesk"),
    portal: document.getElementById("buyPortal")
  };

  function saveGame() {
    localStorage.setItem("dream", dream);
    localStorage.setItem("hunger", hunger);
    localStorage.setItem("mood", mood);
    localStorage.setItem("ownedItems", JSON.stringify(ownedItems));
    localStorage.setItem("achievements", JSON.stringify(achievements));
    localStorage.setItem("totalPets", totalPets);
    localStorage.setItem("totalFeeds", totalFeeds);
    localStorage.setItem("totalOshiFeeds", totalOshiFeeds);
    localStorage.setItem("totalItemsBought", totalItemsBought);
    localStorage.setItem("currentTitle", currentTitle);
    localStorage.setItem("maxDream", maxDream);
    localStorage.setItem("totalDreamEarned", totalDreamEarned);
    localStorage.setItem("rescuedSad", rescuedSad);
    localStorage.setItem("rescuedHungry", rescuedHungry);
    localStorage.setItem("lastSave", Date.now());
  }


  function addDream(amount) {
    dream += amount;
    totalDreamEarned += amount;
    if (dream > maxDream) maxDream = dream;
  }

  function formatNumber(value) {
    value = Math.floor(Number(value) || 0);

    // 数字が増える楽しみを残すため、100万未満は短縮しない
    if (value < 1000000) return String(value);

    const units = [
      { value: 1000000000000, label: "兆" },
      { value: 100000000, label: "億" },
      { value: 10000, label: "万" }
    ];

    for (let i = 0; i < units.length; i++) {
      if (value >= units[i].value) {
        const shortValue = value / units[i].value;
        const text = shortValue >= 100 ? Math.floor(shortValue) : Math.floor(shortValue * 10) / 10;
        return text + units[i].label;
      }
    }

    return String(value);
  }

  function getLevel() {
    return Math.floor(Math.sqrt(totalDreamEarned / 100)) + 1;
  }

  function getLevelName(level) {
    if (level >= 1000) return "夢界の珍獣ののい";
    if (level >= 500) return "究極珍獣ののい";
    if (level >= 250) return "神話級珍獣ののい";
    if (level >= 100) return "伝説の珍獣ののい";
    if (level >= 50) return "超珍獣ののい";
    if (level >= 25) return "熟練珍獣ののい";
    if (level >= 10) return "元気な珍獣ののい";
    return "珍獣ののい";
  }

  function updateLevelBox() {
    const level = getLevel();
    levelBox.textContent = "Lv." + level + " " + getLevelName(level);
  }

  function hasItem(itemId) {
    return ownedItems.includes(itemId);
  }

  function updateItems() {
    Object.keys(itemElements).forEach(function(itemId) {
      if (itemElements[itemId]) {
        itemElements[itemId].style.display = hasItem(itemId) ? "block" : "none";
      }
    });

    Object.keys(buyButtons).forEach(function(itemId) {
      if (buyButtons[itemId]) {
        buyButtons[itemId].disabled = hasItem(itemId);
        buyButtons[itemId].textContent = hasItem(itemId) ? "購入済み" : ITEM_LABELS[itemId];
      }
    });
  }

  function getDreamPerSecondBonus() {
    return ownedItems.reduce(function(total, itemId) {
      return total + (ITEM_DREAM_BONUS[itemId] || 0);
    }, 0);
  }

  function trackEvent(eventName, params) {
    if (typeof gtag === "function") {
      gtag("event", eventName, params || {});
    }
  }

  function setMessage(cry, description, lockSeconds) {
    message.textContent = "「" + cry + "」\n" + description;
    messageLockTimer = Math.max(lockSeconds || 15, 15);
    statusMessageTimer = 15;
  }

  function pickRandom(list) {
    return list[Math.floor(Math.random() * list.length)];
  }

  function setStatusMessage(statusKey) {
    if (messageLockTimer > 0 && statusKey === currentStatusKey) {
      return;
    }

    if (statusKey !== currentStatusKey || statusMessageTimer <= 0) {
      const picked = pickRandom(STATUS_MESSAGES[statusKey]);
      currentStatusKey = statusKey;
      message.textContent = "「" + picked[0] + "」\n" + picked[1];
      statusMessageTimer = 15;
    }
  }

  function getAchievementById(id) {
    return ACHIEVEMENTS.find(function(achievement) {
      return achievement.id === id;
    });
  }

  function updateTitleBadge() {
    const achievement = getAchievementById(currentTitle);
    const titleName = achievement && achievements.includes(currentTitle) ? achievement.name : "なし";

    if (!(achievement && achievements.includes(currentTitle))) {
      currentTitle = "";
    }

    titleBadge.innerHTML = '<div class="title-badge-label">🏅称号</div><div class="title-badge-name">' + titleName + '</div>';
  }

  function setTitle(achievementId) {
    if (!achievements.includes(achievementId)) return;

    currentTitle = achievementId;
    const achievement = getAchievementById(achievementId);
    updateTitleBadge();
    updateAchievements();
    setMessage("きゅぽん！", "称号を「" + achievement.name + "」に設定した。", 15);
    saveGame();
  }

  function toggleAchievements() {
    achievementPanel.classList.toggle("open");
    achievementToggle.textContent = achievementPanel.classList.contains("open") ? "実績を閉じる" : "実績を見る";
  }

  function updateAchievements() {
    achievementList.innerHTML = "";

    ACHIEVEMENTS.forEach(function(achievement) {
      const badge = document.createElement("button");
      const unlocked = achievements.includes(achievement.id);
      const selected = currentTitle === achievement.id;
      badge.className = "achievement-badge " + (unlocked ? "unlocked" : "locked") + (selected ? " selected" : "");
      badge.disabled = !unlocked;

      const name = document.createElement("div");
      name.className = "achievement-name";
      name.textContent = unlocked ? "🏅" + achievement.name + (selected ? " ★" : "") : "🔒？？？";

      const desc = document.createElement("div");
      desc.className = "achievement-desc";
      desc.textContent = unlocked ? achievement.description : "まだ達成していない実績";

      badge.appendChild(name);
      badge.appendChild(desc);

      if (unlocked) {
        badge.onclick = function() {
          setTitle(achievement.id);
        };
      }

      achievementList.appendChild(badge);
    });

    updateTitleBadge();
  }

  function checkAchievements() {
    ACHIEVEMENTS.forEach(function(achievement) {
      if (!achievements.includes(achievement.id) && achievement.condition()) {
        achievements.push(achievement.id);
        setMessage("きゅるるん！", "実績解除：" + achievement.name + "\n" + achievement.description, 15);
        trackEvent("unlock_achievement", { achievement_id: achievement.id, achievement_name: achievement.name });
      }
    });
  }

  function setPetImageByStatus() {
    if (temporaryImageTimer > 0) {
      return;
    }

    if (hunger <= 0) {
      petImage.src = IMAGES.hungry;
    } else if (mood <= 20) {
      petImage.src = IMAGES.sad;
    } else if (hasItem("books") && mood >= 50) {
      petImage.src = IMAGES.book;
    } else if (mood >= 95) {
      petImage.src = IMAGES.superhappy;
    } else if (mood >= 70) {
      petImage.src = IMAGES.happy;
    } else {
      petImage.src = IMAGES.normal;
    }
  }

  function showTemporaryImage(imageUrl, seconds) {
    petImage.src = imageUrl;
    temporaryImageTimer = seconds;
  }

  function updateScreen() {
    dreamText.textContent = formatNumber(dream);
    hungerText.textContent = hunger;
    moodText.textContent = mood;

    hungerBar.style.width = hunger + "%";
    moodBar.style.width = mood + "%";

    updateLevelBox();
    updateItems();
    checkAchievements();
    updateAchievements();
    updateTitleBadge();
    setPetImageByStatus();

    if (messageLockTimer <= 0) {
      if (hunger <= 0) {
        setStatusMessage("hungry");
      } else if (mood <= 20) {
        setStatusMessage("lonely");
      } else if (ownedItems.length >= Object.keys(ITEM_LABELS).length) {
        setStatusMessage("complete");
      } else if (dream >= 3000) {
        setStatusMessage("rich");
      } else if (dream >= 1000) {
        setStatusMessage("wantItem");
      } else {
        setStatusMessage("normal");
      }
    }

    saveGame();
  }

  function petNonoi() {
    addDream(5);
    if (mood <= 20) rescuedSad += 1;
    mood += 5;
    totalPets += 1;

    if (mood > 100) mood = 100;

    showTemporaryImage(IMAGES.happy, 3);
    setMessage("きゅるる……！", "なでられて嬉しいのか、エラと尻尾のハートをふわふわ揺らしている。", 3);
    trackEvent("pet_nonoi", { total_pets: totalPets });
    saveGame();
    updateScreen();
  }

  function feedNonoi(name, price, recovery, moodRecovery) {
    if (dream < price) {
      setMessage("きゅ……", name + "が気になるようだが、夢ポイントが足りない。", 3);
      showTemporaryImage(IMAGES.sad, 3);
      return;
    }

    dream -= price;
    if (hunger <= 0) rescuedHungry += 1;
    hunger += recovery;
    mood += moodRecovery;
    totalFeeds += 1;
    if (name === "推し供給") totalOshiFeeds += 1;
    trackEvent("feed_nonoi", { food_name: name, price: price, total_feeds: totalFeeds });

    if (hunger > 100) hunger = 100;
    if (mood > 100) mood = 100;

    if (name === "推し供給") {
      showTemporaryImage(IMAGES.superhappy, 5);
    } else {
      showTemporaryImage(IMAGES.happy, 3);
    }

    setMessage("きゅぽ……！", name + "を食べて、少し元気になったようだ。", 3);
    saveGame();
    updateScreen();
  }

  function buyItem(itemId, name, price) {
    if (hasItem(itemId)) {
      setMessage("きゅ……？", name + "はもうお部屋に置いてあるようだ。", 3);
      return;
    }

    if (dream < price) {
      setMessage("きゅ……", name + "が気になるようだが、夢ポイントが足りない。", 3);
      showTemporaryImage(IMAGES.sad, 3);
      return;
    }

    dream -= price;
    ownedItems.push(itemId);
    totalItemsBought += 1;
    trackEvent("buy_item", { item_id: itemId, item_name: name, price: price });

    mood += 10;
    if (mood > 100) mood = 100;

    if (itemId === "shrine") {
      showTemporaryImage(IMAGES.superhappy, 5);
      setMessage("きゅるるる……！！", "推し祭壇を見つめて、全身で喜びを表している。夢の気配がすごい。", 4);
    } else if (ITEM_DREAM_BONUS[itemId]) {
      showTemporaryImage(IMAGES.superhappy, 4);
      setMessage("きゅぽぽ……！", name + "を手に入れた。夢ポイントが少し貯まりやすくなったようだ。", 4);
    } else {
      showTemporaryImage(IMAGES.happy, 3);
      setMessage("きゅぽ……！", name + "を気に入ったようだ。新しいものの近くで、じっと嬉しそうにしている。", 3);
    }

    saveGame();
    updateScreen();
  }

  function resetGame() {
    localStorage.removeItem("dream");
    localStorage.removeItem("hunger");
    localStorage.removeItem("mood");
    localStorage.removeItem("ownedItems");
    localStorage.removeItem("achievements");
    localStorage.removeItem("totalPets");
    localStorage.removeItem("totalFeeds");
    localStorage.removeItem("totalOshiFeeds");
    localStorage.removeItem("totalItemsBought");
    localStorage.removeItem("currentTitle");
    localStorage.removeItem("maxDream");
    localStorage.removeItem("totalDreamEarned");
    localStorage.removeItem("rescuedSad");
    localStorage.removeItem("rescuedHungry");
    localStorage.removeItem("lastSave");
    trackEvent("reset_game");

    dream = 0;
    hunger = 50;
    mood = 50;
    ownedItems = [];
    achievements = [];
    totalPets = 0;
    totalFeeds = 0;
    totalOshiFeeds = 0;
    totalItemsBought = 0;
    currentTitle = "";
    maxDream = 0;
    totalDreamEarned = 0;
    rescuedSad = 0;
    rescuedHungry = 0;
    hungerTimer = 0;
    moodTimer = 0;
    halfSpeedTimer = 0;
    temporaryImageTimer = 0;
    messageLockTimer = 0;
    statusMessageTimer = 0;
    currentStatusKey = "";

    petImage.src = IMAGES.normal;

    setMessage("きゅ……？", "不思議そうに首をかしげている。最初からやり直すことになったようだ。", 3);
    updateScreen();
  }

  setInterval(function() {
    const baseDreamPerSecond = 1 + getDreamPerSecondBonus();

    if (hunger <= 0) {
      addDream(Math.max(1, Math.floor(baseDreamPerSecond / 2)));
    } else {
      addDream(baseDreamPerSecond);
    }

    hungerTimer++;
    moodTimer++;

    if (hungerTimer >= 60) {
      hungerTimer = 0;

      if (hunger > 0) {
        hunger -= 1;
      }
    }

    if (moodTimer >= 120) {
      moodTimer = 0;

      if (mood > 0) {
        mood -= 1;
      }
    }

    if (messageLockTimer > 0) {
      messageLockTimer--;
    }

    if (statusMessageTimer > 0) {
      statusMessageTimer--;
    }

    if (temporaryImageTimer > 0) {
      temporaryImageTimer--;

      if (temporaryImageTimer <= 0) {
        setPetImageByStatus();
      }
    }

    updateScreen();
  }, 1000);

  updateScreen();
</script>
</body>
</html>
