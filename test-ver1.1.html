<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>珍獣ののいの部屋</title>
<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: #fff3f8;
    color: #5a3a45;
    text-align: center;
  }

  .game {
    max-width: 960px;
    margin: auto;
    padding: 16px;
    box-sizing: border-box;
  }

  .title-logo {
    width: 360px;
    max-width: 90%;
    margin: 0 auto 10px;
    display: block;
  }

  .room {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background-image:
      linear-gradient(rgba(255,250,252,0.12), rgba(255,250,252,0.12)),
      url("https://raw.githubusercontent.com/nonoygk/chinjunonoy/main/room.png");
    background-size: cover;
    background-position: center;
    border: 3px solid #f3c6d8;
    border-radius: 24px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    overflow: hidden;
  }

  .owned {
    display: none;
  }

  .room-item {
    position: absolute;
    display: none;
    pointer-events: none;
    filter: drop-shadow(0 5px 6px rgba(0,0,0,0.12));
    z-index: 2;
  }

  .item-tea {
    width: 20%;
    left: 42%;
    bottom: 2%;
    z-index: 4;
  }

  .item-books {
    width: 15%;
    left: 26%;
    bottom: 12%;
    z-index: 2;
  }

  .item-plush {
    width: 20%;
    right: 14%;
    bottom: 10%;
    z-index: 2;
  }

  .item-shrine {
    width: 20%;
    left: 20%;
    bottom: 35%;
    z-index: 2;
  }

  .pet {
    position: absolute;
    left: 50%;
    top: 60%;
    transform: translate(-50%, -50%);
    width: 27%;
    max-width: 250px;
    min-width: 140px;
    z-index: 3;
  }

  .pet img {
    width: 100%;
    display: block;
    filter: drop-shadow(0 8px 10px rgba(0,0,0,0.18));
  }

  .status-box {
    position: absolute;
    top: 2%;
    left: 2%;
    width: 52%;
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(255,255,255,0.82);
    border-radius: 16px;
    padding: 10px 14px;
    box-sizing: border-box;
    z-index: 5;
  }

  .points {
    font-size: 18px;
    font-weight: bold;
    margin: 0;
    min-width: 125px;
    white-space: nowrap;
  }

  .status-area {
    flex: 1;
    margin: 0;
    font-weight: bold;
    font-size: 12px;
  }

  .bar {
    width: 100%;
    height: 12px;
    background: #f3d9e5;
    border-radius: 999px;
    overflow: hidden;
    margin-top: 4px;
  }

  .bar-fill {
    height: 100%;
    width: 100%;
    background: #e77da8;
    border-radius: 999px;
    transition: width 0.3s;
  }

  .mood-fill {
    background: #f3a6c8;
  }

  .message {
    width: 100%;
    max-width: 760px;
    margin: 12px auto 14px;
    background: rgba(255,255,255,0.86);
    border: 2px solid #f3c6d8;
    border-radius: 18px;
    padding: 14px 18px;
    line-height: 1.65;
    font-size: 15px;
    white-space: pre-line;
    overflow-wrap: anywhere;
    box-sizing: border-box;
    box-shadow: 0 4px 10px rgba(0,0,0,0.06);
  }

  .action-buttons {
    margin-top: 10px;
    margin-bottom: 12px;
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  button {
    border: none;
    border-radius: 999px;
    background: #e77da8;
    color: white;
    font-size: 15px;
    padding: 10px 18px;
    margin: 5px;
  }

  button:disabled {
    background: #d8c4cc;
    color: #fff;
  }

  .reset {
    background: #b8a0aa;
  }

  .foods, .items, .achievements {
    margin-top: 14px;
  }

  .achievement-list {
    width: 100%;
    max-width: 760px;
    margin: 8px auto 0;
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .achievement-badge {
    background: rgba(255,255,255,0.78);
    border: 2px solid #f3c6d8;
    border-radius: 999px;
    padding: 7px 12px;
    font-size: 13px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.04);
  }

  .achievement-badge.locked {
    color: #b8a0aa;
    background: rgba(255,255,255,0.45);
  }

  h2 {
    display: inline-block;
    font-size: 22px;
    margin: 14px 0 8px;
    padding: 6px 18px;
    color: #7a4b5b;
    background: rgba(255,255,255,0.62);
    border: 2px solid #f3c6d8;
    border-radius: 999px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.04);
  }

  @media (max-width: 600px) {
    .game {
      padding: 8px;
    }

    .title-logo {
      width: 260px;
      margin-bottom: 8px;
    }

    .room {
      aspect-ratio: 16 / 10;
    }

    .pet {
      width: 32%;
      top: 56%;
    }

    .status-box {
      top: 2%;
      left: 2%;
      width: 58%;
      gap: 6px;
      padding: 6px 8px;
      border-radius: 12px;
    }

    .points {
      font-size: 10px;
      min-width: 72px;
    }

    .status-area {
      font-size: 8px;
    }

    .bar {
      height: 7px;
      margin-top: 2px;
    }

    .message {
      font-size: 13px;
      padding: 12px;
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .item-tea {
      width: 21%;
      left: 41%;
      bottom: 2%;
    }

    .item-books {
      width: 16%;
      left: 23%;
      bottom: 12%;
    }

    .item-plush {
      width: 22%;
      right: 13%;
      bottom: 10%;
    }

    .item-shrine {
      width: 21%;
      left: 19%;
      bottom: 35%;
    }

    .action-buttons {
      margin-top: 10px;
      margin-bottom: 10px;
    }

    button {
      font-size: 12px;
      padding: 7px 13px;
      margin: 4px;
    }

    h2 {
      font-size: 18px;
      margin-top: 16px;
      padding: 5px 16px;
    }
  }
</style>
</head>

<body>
<div class="game">

  <img
    class="title-logo"
    src="https://raw.githubusercontent.com/nonoygk/chinjunonoy/main/title.png"
    alt="珍獣ののいの部屋"
  >

  <div class="room">
    <div class="owned" id="ownedItems"></div>

    <img id="itemTea" class="room-item item-tea" src="https://raw.githubusercontent.com/nonoygk/chinjunonoy/main/%20%20%20%20tea-set.png" alt="ティーセット">
    <img id="itemBooks" class="room-item item-books" src="https://raw.githubusercontent.com/nonoygk/chinjunonoy/main/%20%20%20%20books-stack.png" alt="本の山">
    <img id="itemPlush" class="room-item item-plush" src="https://raw.githubusercontent.com/nonoygk/chinjunonoy/main/%20%20%20%20seal-plush.png" alt="ぬいぐるみ">
    <img id="itemShrine" class="room-item item-shrine" src="https://raw.githubusercontent.com/nonoygk/chinjunonoy/main/%20%20%20%20oshi-shrine.png" alt="推し祭壇">

    <div class="pet">
      <img
        id="petImage"
        src="https://raw.githubusercontent.com/nonoygk/chinjunonoy/main/no-normal.png"
        alt="珍獣ののい"
      >
    </div>

    <div class="status-box">
      <div class="points">
        夢ポイント：<span id="dream">0</span>
      </div>

      <div class="status-area">
        おなか：<span id="hungerText">50</span>%
        <div class="bar">
          <div class="bar-fill" id="hungerBar"></div>
        </div>
      </div>

      <div class="status-area">
        ご機嫌：<span id="moodText">50</span>%
        <div class="bar">
          <div class="bar-fill mood-fill" id="moodBar"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="message" id="message">
「きゅ……」
何かを期待する目で、こちらをじっと見ている。
  </div>

  <div class="action-buttons">
    <button onclick="petNonoi()">なでる</button>
    <button class="reset" onclick="resetGame()">リセット</button>
  </div>

  <div class="foods">
    <h2>🍬エサ</h2>
    <br>
    <button onclick="feedNonoi('お花クッキー', 100, 15, 5)">お花クッキー 100夢</button>
    <button onclick="feedNonoi('夢色マカロン', 300, 40, 15)">夢色マカロン 300夢</button>
    <button onclick="feedNonoi('推し供給', 800, 100, 40)">推し供給 800夢</button>
  </div>

  <div class="items">
    <h2>🧸アイテム</h2>
    <br>
    <button id="buyBooks" onclick="buyItem('books', '本の山', 2000)">本の山 2000夢</button>
    <button id="buyTea" onclick="buyItem('tea', 'ティーセット', 3500)">ティーセット 3500夢</button>
    <button id="buyPlush" onclick="buyItem('plush', '白いアザラシのぬいぐるみ', 6000)">ぬいぐるみ 6000夢</button>
    <button id="buyShrine" onclick="buyItem('shrine', '推し祭壇', 10000)">推し祭壇 10000夢</button>
  </div>

  <div class="achievements">
    <h2>🏅実績</h2>
    <div class="achievement-list" id="achievementList"></div>
  </div>
</div>

<script>
  const IMAGES = {
    normal: "https://raw.githubusercontent.com/nonoygk/chinjunonoy/main/no-normal.png",
    happy: "https://raw.githubusercontent.com/nonoygk/chinjunonoy/main/no-happy.png",
    sad: "https://raw.githubusercontent.com/nonoygk/chinjunonoy/main/no-sad.png",
    hungry: "https://raw.githubusercontent.com/nonoygk/chinjunonoy/main/no-hungry.png",
    superhappy: "https://raw.githubusercontent.com/nonoygk/chinjunonoy/main/no-superhappy.png",
    book: "https://raw.githubusercontent.com/nonoygk/chinjunonoy/main/no-book.png"
  };

  const ITEM_LABELS = {
    books: "本の山 2000夢",
    tea: "ティーセット 3500夢",
    plush: "ぬいぐるみ 6000夢",
    shrine: "推し祭壇 10000夢"
  };

  const STATUS_MESSAGES = {
    hungry: [
      ["きゅ……", "おなかがぺこぺこで、夢ポイントを集める元気が少し落ちているようだ。"],
      ["きゅぽ……", "空っぽのおなかを抱えて、こちらをうるうる見つめている。"],
      ["きゅぅ……", "何かおいしいものの気配を探して、そわそわしている。"]
    ],
    lonely: [
      ["きゅ……", "少しさみしそうにしている。なでてあげると元気になるかもしれない。"],
      ["きゅる……", "かまってほしそうに、そっとこちらへ寄ってきた。"],
      ["きゅぽ……", "しょんぼりしている。優しく声をかけてほしいようだ。"]
    ],
    complete: [
      ["きゅるるる……！", "お気に入りの小物に囲まれて、エラと尻尾のハートをふわふわ揺らしている。かなり満足そうだ。"],
      ["きゅぽぽ……！", "可愛いお部屋を見回して、誇らしげに胸を張っている。"],
      ["きゅきゅっ！", "小物に囲まれた自分の王国で、すっかりご満悦のようだ。"]
    ],
    rich: [
      ["きゅぽ……きゅぽ……", "夢ポイントの気配を感じているのか、目をきらきらさせながら小さく鳴いている。"],
      ["きゅるん……", "夢ポイントをちらちら見て、次に何を買ってもらえるのか期待している。"],
      ["きゅぽぽ……", "貯まった夢の気配に包まれて、なんだか得意げだ。"]
    ],
    wantItem: [
      ["きゅる……", "お部屋を見回している。どうやら、もっと可愛いものを置いてほしいらしい。"],
      ["きゅ……？", "空いている場所をじっと見つめている。新しい小物を想像しているようだ。"],
      ["きゅぽ……", "可愛いものが増える予感に、そわそわしている。"]
    ],
    normal: [
      ["きゅ……", "何かを期待する目で、こちらをじっと見ている。"],
      ["きゅる？", "小さく首をかしげて、こちらの様子をうかがっている。"],
      ["きゅぽ……", "のんびりくつろぎながら、夢ポイントが貯まるのを待っている。"]
    ]
  };

  const ACHIEVEMENTS = [
    { id: "firstPet", name: "はじめてのなでなで", description: "はじめてののいをなでた", condition: function() { return totalPets >= 1; } },
    { id: "pet10", name: "なでなで職人", description: "ののいを10回なでた", condition: function() { return totalPets >= 10; } },
    { id: "firstFeed", name: "はじめてのごはん", description: "はじめてエサをあげた", condition: function() { return totalFeeds >= 1; } },
    { id: "oshi5", name: "推し供給係", description: "推し供給を5回あげた", condition: function() { return totalOshiFeeds >= 5; } },
    { id: "dream1000", name: "夢の貯金箱", description: "夢ポイントを1000以上貯めた", condition: function() { return dream >= 1000; } },
    { id: "dream10000", name: "限界夢女の気配", description: "夢ポイントを10000以上貯めた", condition: function() { return dream >= 10000; } },
    { id: "firstItem", name: "お部屋づくり開始", description: "はじめてアイテムを置いた", condition: function() { return totalItemsBought >= 1 || ownedItems.length >= 1; } },
    { id: "allItems", name: "夢のお部屋完成", description: "すべてのアイテムを集めた", condition: function() { return ownedItems.length >= Object.keys(ITEM_LABELS).length; } }
  ];

  let dream = Number(localStorage.getItem("dream")) || 0;
  let hunger = Number(localStorage.getItem("hunger")) || 50;
  let mood = Number(localStorage.getItem("mood")) || 50;
  let ownedItems = JSON.parse(localStorage.getItem("ownedItems")) || [];
  let achievements = JSON.parse(localStorage.getItem("achievements")) || [];
  let totalPets = Number(localStorage.getItem("totalPets")) || 0;
  let totalFeeds = Number(localStorage.getItem("totalFeeds")) || 0;
  let totalOshiFeeds = Number(localStorage.getItem("totalOshiFeeds")) || 0;
  let totalItemsBought = Number(localStorage.getItem("totalItemsBought")) || 0;

  let hungerTimer = 0;
  let moodTimer = 0;
  let halfSpeedTimer = 0;
  let temporaryImageTimer = 0;
  let messageLockTimer = 0;
  let currentStatusKey = "";

  ownedItems = ownedItems.map(function(item) {
    if (item === "📚") return "books";
    if (item === "🫖") return "tea";
    if (item === "🧸") return "plush";
    if (item === "✨") return "shrine";
    return item;
  });

  const lastSave = Number(localStorage.getItem("lastSave")) || Date.now();
  const now = Date.now();
  const offlineSeconds = Math.floor((now - lastSave) / 1000);

  if (offlineSeconds > 0) {
    let offlineDream = offlineSeconds;

    if (hunger <= 0) {
      offlineDream = Math.floor(offlineSeconds / 2);
    }

    dream += offlineDream;
    hunger -= Math.floor(offlineSeconds / 60);
    mood -= Math.floor(offlineSeconds / 120);

    if (hunger < 0) hunger = 0;
    if (mood < 0) mood = 0;
  }

  const dreamText = document.getElementById("dream");
  const message = document.getElementById("message");
  const hungerText = document.getElementById("hungerText");
  const hungerBar = document.getElementById("hungerBar");
  const moodText = document.getElementById("moodText");
  const moodBar = document.getElementById("moodBar");
  const petImage = document.getElementById("petImage");
  const achievementList = document.getElementById("achievementList");

  const itemElements = {
    books: document.getElementById("itemBooks"),
    tea: document.getElementById("itemTea"),
    plush: document.getElementById("itemPlush"),
    shrine: document.getElementById("itemShrine")
  };

  const buyButtons = {
    books: document.getElementById("buyBooks"),
    tea: document.getElementById("buyTea"),
    plush: document.getElementById("buyPlush"),
    shrine: document.getElementById("buyShrine")
  };

  function saveGame() {
    localStorage.setItem("dream", dream);
    localStorage.setItem("hunger", hunger);
    localStorage.setItem("mood", mood);
    localStorage.setItem("ownedItems", JSON.stringify(ownedItems));
    localStorage.setItem("achievements", JSON.stringify(achievements));
    localStorage.setItem("totalPets", totalPets);
    localStorage.setItem("totalFeeds", totalFeeds);
    localStorage.setItem("totalOshiFeeds", totalOshiFeeds);
    localStorage.setItem("totalItemsBought", totalItemsBought);
    localStorage.setItem("lastSave", Date.now());
  }

  function hasItem(itemId) {
    return ownedItems.includes(itemId);
  }

  function updateItems() {
    Object.keys(itemElements).forEach(function(itemId) {
      itemElements[itemId].style.display = hasItem(itemId) ? "block" : "none";
    });

    Object.keys(buyButtons).forEach(function(itemId) {
      buyButtons[itemId].disabled = hasItem(itemId);
      buyButtons[itemId].textContent = hasItem(itemId) ? "購入済み" : ITEM_LABELS[itemId];
    });
  }

  function setMessage(cry, description, lockSeconds) {
    message.textContent = "「" + cry + "」\n" + description;

    if (lockSeconds) {
      messageLockTimer = lockSeconds;
    }
  }

  function pickRandom(list) {
    return list[Math.floor(Math.random() * list.length)];
  }

  function setStatusMessage(statusKey) {
    if (messageLockTimer > 0 && statusKey === currentStatusKey) {
      return;
    }

    if (statusKey !== currentStatusKey || messageLockTimer <= 0) {
      const picked = pickRandom(STATUS_MESSAGES[statusKey]);
      currentStatusKey = statusKey;
      setMessage(picked[0], picked[1]);
    }
  }

  function updateAchievements() {
    achievementList.innerHTML = "";

    ACHIEVEMENTS.forEach(function(achievement) {
      const badge = document.createElement("div");
      const unlocked = achievements.includes(achievement.id);
      badge.className = "achievement-badge" + (unlocked ? "" : " locked");
      badge.textContent = unlocked ? "🏅" + achievement.name : "🔒？？？";
      badge.title = unlocked ? achievement.description : "まだ達成していない実績";
      achievementList.appendChild(badge);
    });
  }

  function checkAchievements() {
    ACHIEVEMENTS.forEach(function(achievement) {
      if (!achievements.includes(achievement.id) && achievement.condition()) {
        achievements.push(achievement.id);
        setMessage("きゅるるん！", "実績解除：" + achievement.name + "\n" + achievement.description, 4);
      }
    });
  }

  function setPetImageByStatus() {
    if (temporaryImageTimer > 0) {
      return;
    }

    if (hunger <= 0) {
      petImage.src = IMAGES.hungry;
    } else if (mood <= 20) {
      petImage.src = IMAGES.sad;
    } else if (hasItem("books") && mood >= 50) {
      petImage.src = IMAGES.book;
    } else if (mood >= 95) {
      petImage.src = IMAGES.superhappy;
    } else if (mood >= 70) {
      petImage.src = IMAGES.happy;
    } else {
      petImage.src = IMAGES.normal;
    }
  }

  function showTemporaryImage(imageUrl, seconds) {
    petImage.src = imageUrl;
    temporaryImageTimer = seconds;
  }

  function updateScreen() {
    dreamText.textContent = dream;
    hungerText.textContent = hunger;
    moodText.textContent = mood;

    hungerBar.style.width = hunger + "%";
    moodBar.style.width = mood + "%";

    updateItems();
    checkAchievements();
    updateAchievements();
    setPetImageByStatus();

    if (messageLockTimer <= 0) {
      if (hunger <= 0) {
        setStatusMessage("hungry");
      } else if (mood <= 20) {
        setStatusMessage("lonely");
      } else if (ownedItems.length >= Object.keys(ITEM_LABELS).length) {
        setStatusMessage("complete");
      } else if (dream >= 3000) {
        setStatusMessage("rich");
      } else if (dream >= 1000) {
        setStatusMessage("wantItem");
      } else {
        setStatusMessage("normal");
      }
    }

    saveGame();
  }

  function petNonoi() {
    dream += 5;
    mood += 5;
    totalPets += 1;

    if (mood > 100) mood = 100;

    showTemporaryImage(IMAGES.happy, 3);
    setMessage("きゅるる……！", "なでられて嬉しいのか、エラと尻尾のハートをふわふわ揺らしている。", 3);
    saveGame();
    updateScreen();
  }

  function feedNonoi(name, price, recovery, moodRecovery) {
    if (dream < price) {
      setMessage("きゅ……", name + "が気になるようだが、夢ポイントが足りない。", 3);
      showTemporaryImage(IMAGES.sad, 3);
      return;
    }

    dream -= price;
    hunger += recovery;
    mood += moodRecovery;
    totalFeeds += 1;
    if (name === "推し供給") totalOshiFeeds += 1;

    if (hunger > 100) hunger = 100;
    if (mood > 100) mood = 100;

    if (name === "推し供給") {
      showTemporaryImage(IMAGES.superhappy, 5);
    } else {
      showTemporaryImage(IMAGES.happy, 3);
    }

    setMessage("きゅぽ……！", name + "を食べて、少し元気になったようだ。", 3);
    saveGame();
    updateScreen();
  }

  function buyItem(itemId, name, price) {
    if (hasItem(itemId)) {
      setMessage("きゅ……？", name + "はもうお部屋に置いてあるようだ。", 3);
      return;
    }

    if (dream < price) {
      setMessage("きゅ……", name + "が気になるようだが、夢ポイントが足りない。", 3);
      showTemporaryImage(IMAGES.sad, 3);
      return;
    }

    dream -= price;
    ownedItems.push(itemId);
    totalItemsBought += 1;

    mood += 10;
    if (mood > 100) mood = 100;

    if (itemId === "shrine") {
      showTemporaryImage(IMAGES.superhappy, 5);
      setMessage("きゅるるる……！！", "推し祭壇を見つめて、全身で喜びを表している。夢の気配がすごい。", 4);
    } else {
      showTemporaryImage(IMAGES.happy, 3);
      setMessage("きゅぽ……！", name + "を気に入ったようだ。新しいものの近くで、じっと嬉しそうにしている。", 3);
    }

    saveGame();
    updateScreen();
  }

  function resetGame() {
    localStorage.removeItem("dream");
    localStorage.removeItem("hunger");
    localStorage.removeItem("mood");
    localStorage.removeItem("ownedItems");
    localStorage.removeItem("achievements");
    localStorage.removeItem("totalPets");
    localStorage.removeItem("totalFeeds");
    localStorage.removeItem("totalOshiFeeds");
    localStorage.removeItem("totalItemsBought");
    localStorage.removeItem("lastSave");

    dream = 0;
    hunger = 50;
    mood = 50;
    ownedItems = [];
    achievements = [];
    totalPets = 0;
    totalFeeds = 0;
    totalOshiFeeds = 0;
    totalItemsBought = 0;
    hungerTimer = 0;
    moodTimer = 0;
    halfSpeedTimer = 0;
    temporaryImageTimer = 0;
    messageLockTimer = 0;
    currentStatusKey = "";

    petImage.src = IMAGES.normal;

    setMessage("きゅ……？", "不思議そうに首をかしげている。最初からやり直すことになったようだ。", 3);
    updateScreen();
  }

  setInterval(function() {
    if (hunger <= 0) {
      halfSpeedTimer++;

      if (halfSpeedTimer >= 2) {
        dream += 1;
        halfSpeedTimer = 0;
      }
    } else {
      dream += 1;
    }

    hungerTimer++;
    moodTimer++;

    if (hungerTimer >= 60) {
      hungerTimer = 0;

      if (hunger > 0) {
        hunger -= 1;
      }
    }

    if (moodTimer >= 120) {
      moodTimer = 0;

      if (mood > 0) {
        mood -= 1;
      }
    }

    if (messageLockTimer > 0) {
      messageLockTimer--;
    }

    if (temporaryImageTimer > 0) {
      temporaryImageTimer--;

      if (temporaryImageTimer <= 0) {
        setPetImageByStatus();
      }
    }

    updateScreen();
  }, 1000);

  updateScreen();
</script>
</body>
</html>
